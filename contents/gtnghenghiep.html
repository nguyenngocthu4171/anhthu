  <h1>GIỚI THIỆU NGÀNH CREATE DESIGNER (Thiết kế sáng tạo)  </h1>
  <ol type = "I" class= "f1" > 
    <li > SƠ LƯỢC VỀ NGÀNH CREATE DESIGNER  </li>
     <ul class="f2">
        <li> KHÁI NIỆM: Creative Designer (Nhà thiết kế sáng tạo) là những chuyên gia sử dụng tư duy nghệ thuật, trí tưởng tượng và các công cụ kỹ thuật để tạo ra các sản phẩm .</li>
        <li> VIỆC CẦN LÀM: Thiết kế bộ nhận diện thương hiệu (Logo, màu sắc), ấn phẩm truyền thông (Poster, Banner), giao diện web/app (UI/UX). </li>
     </ul>
    <li> QUY TRÌNH VIỆC LÀM
     <ol type="1" class="f2">
        <li> Nhận Brief (Yêu cầu): Hiểu khách hàng là ai và họ muốn gì. </li>
        <li> Nghiên cứu (Research): Tìm hiểu đối thủ và xu hướng thị trường. </li>
        <li> Lên ý tưởng (Moodboard): Thu thập hình ảnh, màu sắc để định hình phong cách. </li>
        <li> Thiết kế (Execution): Sử dụng công cụ (Photoshop, Illustrator, Figma) để tạo ra sản phẩm. </li>
        <li> Chỉnh sửa (Feedback): Hoàn thiện dựa trên ý kiến đóng góp. </li>
     </ol>
    </li>
    <li>TẠI SAO NÊN CHỌN HỌC NGÀNH CREATE DESIGNER? </li>
     <ul class= "f2" >
      <li> Tự do sáng tạo và phát triển bản thân: Bạn được thỏa sức biến ý tưởng thành sản phẩm thực tế, rèn luyện tư duy nghệ thuật, thẩm mỹ và không bao giờ nhàm chán.</li>
      <li> Không lo thất nghiệp - Nhu cầu thị trường lớn: Mọi doanh nghiệp đều cần marketing, truyền thông và bộ nhận diện thương hiệu, dẫn đến nhu cầu tuyển dụng cao.</li>
      <li> Môi trường làm việc năng động, linh hoạt: Bạn có thể làm việc tự do (freelancer), làm tại agency hoặc các công ty trẻ trung, sáng tạo, thời gian làm việc linh hoạt. </li>
      <li> Thu nhập tốt và cơ hội phát triển: Mức lương cho designer khá cạnh tranh. Khi có kinh nghiệm, bạn dễ dàng thăng tiến hoặc nhận dự án ngoài.</li>
      <li> Khả năng ứng dụng rộng rãi: Bạn có thể làm việc trong nhiều lĩnh vực: thiết kế web/app, thiết kế game, marketing, in ấn, hoặc multimedia.</li>
     </ul> 
    <li> LÍ DO LỰA CHỌN </li>
     <ul class= "f2" >
      <li> ANH THƯ: yêu thích hội hoạ nghề nghiệp phù hợp với khả năng kĩ năng của bản thân</li>
      <li> XUÂN NHI: thích sáng tạo, thiết kế cái mới mẻ, có thể làm việc tại nhà.</li>
     </ul>
  </ol>
